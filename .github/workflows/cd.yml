name: CD

on:
  push:
    branches: [main]

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Detect whether Docker Hub credentials are configured. When they are
      # missing the workflow still builds the image (proves the Dockerfile is
      # valid) but skips the push, so CD stays green on forks/PRs without
      # requiring secrets to be set.
      - name: Detect Docker Hub credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$DOCKER_USERNAME" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKER_USERNAME secret not set — building image without pushing."
          fi

      - name: Log in to Docker Hub
        if: steps.creds.outputs.has_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (and push if creds available)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.creds.outputs.has_creds == 'true' }}
          tags: |
            aseptimu/algo-bot:latest
            aseptimu/algo-bot:${{ github.sha }}
